services:
  postgres:
    image: postgres:15
    container_name: postgres-db-gin
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gin

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-gin
    restart: always
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gin

  redis:
    image: redis:7
    container_name: redis-gin
    restart: always
    ports:
      - "6379:6379"
    networks:
      - gin
 
volumes:
  pgdata:

networks:
  gin: